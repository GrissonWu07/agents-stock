name: Docker Publish

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

env:
  IMAGE_NAME: grissonwu07/xuanwustock
  DOCKER_CONFIG: /tmp/.docker-xuanwustock

jobs:
  build-and-push:
    runs-on:
      - self-hosted
      - macOS
      - xuanwustock
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare Docker config
        run: |
          set -euo pipefail
          mkdir -p "$DOCKER_CONFIG"
          printf '{}\n' > "$DOCKER_CONFIG/config.json"

      - name: Configure Docker Hub auth
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          set -euo pipefail
          AUTH="$(printf '%s:%s' "$DOCKERHUB_USERNAME" "$DOCKERHUB_TOKEN" | base64 | tr -d '\n')"
          cat > "$DOCKER_CONFIG/config.json" <<EOF
          {
            "auths": {
              "https://index.docker.io/v1/": {
                "auth": "$AUTH"
              }
            }
          }
          EOF

      - name: Build and push backend image
        run: |
          set -euo pipefail
          SHORT_SHA="${GITHUB_SHA::7}"
          TAGS=("${IMAGE_NAME}:sha-${SHORT_SHA}")
          if [ "${GITHUB_REF_TYPE}" = "branch" ] && [ "${GITHUB_REF_NAME}" = "main" ]; then
            TAGS+=("${IMAGE_NAME}:latest")
          fi
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            TAGS+=("${IMAGE_NAME}:${GITHUB_REF_NAME}")
          fi
          BUILD_TAG_ARGS=""
          for tag in "${TAGS[@]}"; do
            BUILD_TAG_ARGS="$BUILD_TAG_ARGS -t $tag"
          done
          docker --config "$DOCKER_CONFIG" build -f build/Dockerfile $BUILD_TAG_ARGS .
          for tag in "${TAGS[@]}"; do
            docker --config "$DOCKER_CONFIG" push "$tag"
          done

      - name: Build and push frontend image
        run: |
          set -euo pipefail
          SHORT_SHA="${GITHUB_SHA::7}"
          TAGS=("${IMAGE_NAME}:ui-sha-${SHORT_SHA}")
          if [ "${GITHUB_REF_TYPE}" = "branch" ] && [ "${GITHUB_REF_NAME}" = "main" ]; then
            TAGS+=("${IMAGE_NAME}:ui-latest")
          fi
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            TAGS+=("${IMAGE_NAME}:ui-${GITHUB_REF_NAME}")
          fi
          BUILD_TAG_ARGS=""
          for tag in "${TAGS[@]}"; do
            BUILD_TAG_ARGS="$BUILD_TAG_ARGS -t $tag"
          done
          docker --config "$DOCKER_CONFIG" build -f build/Dockerfile.ui $BUILD_TAG_ARGS .
          for tag in "${TAGS[@]}"; do
            docker --config "$DOCKER_CONFIG" push "$tag"
          done
