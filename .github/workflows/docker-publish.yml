name: Docker Publish

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

env:
  IMAGE_NAME: grissonwu07/xuanwustock
  DOCKER_CONFIG: /tmp/.docker-xuanwustock

jobs:
  build-and-push:
    runs-on:
      - self-hosted
      - macOS
      - xuanwustock
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare Docker config
        run: |
          set -euo pipefail
          mkdir -p "$DOCKER_CONFIG"
          printf '{}\n' > "$DOCKER_CONFIG/config.json"

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Backend image metadata
        id: backend_meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha
            type=ref,event=tag

      - name: Build and push backend image
        run: |
          set -euo pipefail
          TAG_FILE="$(mktemp)"
          printf '%s\n' "${{ steps.backend_meta.outputs.tags }}" | sed '/^\s*$/d' > "$TAG_FILE"
          BUILD_TAG_ARGS=""
          while IFS= read -r tag; do
            BUILD_TAG_ARGS="$BUILD_TAG_ARGS -t $tag"
          done < "$TAG_FILE"
          docker build -f build/Dockerfile $BUILD_TAG_ARGS .
          while IFS= read -r tag; do
            docker push "$tag"
          done < "$TAG_FILE"

      - name: Frontend image metadata
        id: frontend_meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=ui-latest,enable={{is_default_branch}}
            type=sha,prefix=ui-
            type=ref,event=tag,prefix=ui-

      - name: Build and push frontend image
        run: |
          set -euo pipefail
          TAG_FILE="$(mktemp)"
          printf '%s\n' "${{ steps.frontend_meta.outputs.tags }}" | sed '/^\s*$/d' > "$TAG_FILE"
          BUILD_TAG_ARGS=""
          while IFS= read -r tag; do
            BUILD_TAG_ARGS="$BUILD_TAG_ARGS -t $tag"
          done < "$TAG_FILE"
          docker build -f build/Dockerfile.ui $BUILD_TAG_ARGS .
          while IFS= read -r tag; do
            docker push "$tag"
          done < "$TAG_FILE"
